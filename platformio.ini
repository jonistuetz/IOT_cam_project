; PlatformIO-Projektkonfiguration
;
;   Build-Optionen: Build-Flags, Source-Filter
;   Upload-Optionen: Port, Geschwindigkeit und Zusatzflags
;   Bibliotheken: Abhängigkeiten und zusätzliche Library-Pfade
;   Erweiterte Optionen: eigene Skripte
;
; Weitere Optionen und Beispiele:
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
  adafruit/Adafruit SSD1306
  adafruit/Adafruit GFX Library
